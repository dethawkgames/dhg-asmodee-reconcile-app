<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asmodee Quote Reconciliation</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; color: #1a1a1a; }
  h1 { font-size: 22px; }
  .upload-zone { border: 2px dashed #ccc; border-radius: 8px; padding: 40px; text-align: center; margin: 20px 0; }
  .upload-zone.dragover { border-color: #4a7; background: #f0fff4; }
  input[type=file] { margin: 10px 0; }
  button { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-size: 14px; cursor: pointer; }
  button:disabled { background: #999; cursor: not-allowed; }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; }
  th { background: #f7f7f7; }
  .status-match { color: #16a34a; }
  .status-more { color: #d97706; }
  .status-less { color: #dc2626; }
  .status-missing { color: #dc2626; font-weight: 600; }
  .status-unexpected { color: #d97706; font-weight: 600; }
  .summary { margin: 16px 0; padding: 12px; background: #f7f7f7; border-radius: 6px; font-size: 14px; }
  .loading { color: #666; }
  .error { color: #dc2626; padding: 12px; background: #fef2f2; border-radius: 6px; }
</style>
</head>
<body>

<h1>Asmodee Quote Reconciliation</h1>
<p>Upload this week's Asmodee shipping quote PDF to compare it against what was submitted in the Asmodee Order tab.</p>

<div class="upload-zone" id="dropZone">
  <p>Drop the quote PDF here, or choose a file</p>
  <input type="file" id="fileInput" accept="application/pdf">
  <br>
  <button id="uploadBtn" disabled>Compare</button>
</div>

<div id="result"></div>

<script>
const fileInput = document.getElementById('fileInput');
const uploadBtn = document.getElementById('uploadBtn');
const dropZone = document.getElementById('dropZone');
const resultDiv = document.getElementById('result');

let selectedFile = null;

fileInput.addEventListener('change', (e) => {
  selectedFile = e.target.files[0];
  uploadBtn.disabled = !selectedFile;
});

dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) {
    selectedFile = e.dataTransfer.files[0];
    uploadBtn.disabled = false;
  }
});

function statusClass(status) {
  if (status === 'Match') return 'status-match';
  if (status.includes('More than')) return 'status-more';
  if (status.includes('Less than')) return 'status-less';
  if (status.includes('Missing')) return 'status-missing';
  if (status.includes('not submitted')) return 'status-unexpected';
  return '';
}

uploadBtn.addEventListener('click', async () => {
  if (!selectedFile) return;

  uploadBtn.disabled = true;
  resultDiv.innerHTML = '<p class="loading">Parsing quote and comparing against submitted order...</p>';

  const formData = new FormData();
  formData.append('file', selectedFile);

  try {
    const res = await fetch('/api/reconcile', { method: 'POST', body: formData });
    const data = await res.json();

    if (!res.ok || data.error) {
      resultDiv.innerHTML = `<div class="error">Error: ${data.error || 'Unknown error'}</div>`;
      uploadBtn.disabled = false;
      return;
    }

    const matchCount = data.results.filter(r => r[4] === 'Match').length;
    const issueCount = data.results.length - matchCount;

    let html = `<div class="summary">
      <strong>${data.itemsInQuote}</strong> items in quote &middot;
      <strong>${data.itemsSubmitted}</strong> items submitted &middot;
      <strong>${matchCount}</strong> matched &middot;
      <strong>${issueCount}</strong> need a look
    </div>`;

    html += '<table><thead><tr><th>SKU</th><th>Title</th><th>Submitted</th><th>Quoted</th><th>Status</th></tr></thead><tbody>';
    for (const row of data.results) {
      const [sku, title, submitted, quoted, status] = row;
      html += `<tr>
        <td>${sku}</td>
        <td>${title}</td>
        <td>${submitted}</td>
        <td>${quoted}</td>
        <td class="${statusClass(status)}">${status}</td>
      </tr>`;
    }
    html += '</tbody></table>';
    html += '<p style="color:#666; font-size:13px; margin-top:16px;">Also saved to the "Latest Reconciliation" tab in the aggregation sheet.</p>';

    resultDiv.innerHTML = html;
  } catch (err) {
    resultDiv.innerHTML = `<div class="error">Request failed: ${err.message}</div>`;
  }

  uploadBtn.disabled = false;
});
</script>

</body>
</html>
